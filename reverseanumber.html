<html>
<head>
    <title>Reverse a Number</title>
</head>
<body>

    <h1>Reverse a Number</h1>

    <label for="number">Enter a number:</label>
    <input type="number" id="number">
    <button onclick="reverseNumber()">Reverse</button>

    <p>Reversed number: <span id="result"></span></p>

    <script>
        function reverseNumber() {
            const number = document.getElementById("number").value;
            const reversed = parseFloat(number.toString().split('').reverse().join(''));
            document.getElementById("result").textContent = reversed;
        }
    </script>

</body>
</html>
