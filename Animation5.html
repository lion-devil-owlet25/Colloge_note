<html>
<head>
<script src="jquery-3.6.1.js"></script>
<script> 
$(document).ready(function(){
  $("button").click(function(){
    $("img").slideUp(2000).slideDown(2000);
  });
});
</script> 
</head>
<body>
<img src="Chrysanthemum.jpg" height="500" width="500" ><br>
<button>Start Animation</button>
</body>
</html>
