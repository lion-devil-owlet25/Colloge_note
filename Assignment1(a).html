<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techno India University Admission Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            margin: 0;
            padding: 20px;
        }
        form {
            background: pink;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: red;
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
	
        input[type="submit"] {
            background-color: yellow;
            color: blue;
            border: none;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: pink;
        }
</style>
</head>
<body>

<h1>Techno India University Admission Form</h1>
<form action="#" method="post">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="address">Address:</label>
    <input type="text" id="address" name="address" required>

    <label for="phone">Phone No:</label>
    <input type="tel" id="phone" name="phone" required>

    <label for="parentsName">Parents' Name:</label>
    <input type="text" id="parentsName" name="parentsName" required>

    <label for="income">Annual Family Income:</label>
    <input type="number" id="income" name="income" required>

    <label for="gender">Gender:</label>
    <select id="gender" name="gender" required>
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
    </select>

    <label for="caste">Special Caste (if any):</label>
    <input type="text" id="caste" name="caste">

    <label for="religion">Religion:</label>
    <input type="text" id="religion" name="religion" required>

    <label for="course">Course Applying For:</label>
    <input type="text" id="course" name="course" required>

    <label for="email">Email ID:</label>
    <input type="email" id="email" name="email" required>

    <label for="qualifications">Previous Qualifications (with marks):</label>
    <textarea id="qualifications" name="qualifications" rows="3" required></textarea>

    <input type="submit" value="Submit">
</form>

</body>
</html>
