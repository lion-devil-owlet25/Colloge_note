<html>
<head>
<script src="jquery-3.6.1.js"></script>
<script> 
$(document).ready(function(){
  $("button").click(function(){
    $("img").animate({
      left: '300px',
      height: '+=150px',
      width: '+=150px'
    });
  });
});
</script> 
</head>
<body>

<button>Start Animation</button>

<img src="Chrysanthemum.jpg" height="100" width="100" style="position:absolute";>
</body>
</html>
