<html>
<head>
<script src="jquery-3.6.1.js"></script>
<script> 
$(document).ready(function(){
  $("button").click(function(){
    $("img").animate({
      left: '300px',
      opacity: '0.7',
      height: '450px',
      width: '450px'
    },"slow");
  });
});
</script> 
</head>
<body>
<button>Start Animation</button><br>
<img src="Chrysanthemum.jpg" height="100" width="100" style="position: absolute"; >

</body>
</html>
